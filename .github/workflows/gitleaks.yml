---
name: gitleaks

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: 45 21 * * FRI

permissions: {}

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    permissions:
      contents: read
      pull-requests: read
    uses: andreygrechin/github-actions/.github/workflows/gitleaks.yml@5cdaeacbc0380074d166b3486c3e9e24a05275d5 # v1.2.0
